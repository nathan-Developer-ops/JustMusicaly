<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="https://www.youtube.com/iframe_api"></script>
<title>JustMusic</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0a0a;--bg2:#161616;--bg3:#1e1e1e;--txt:#fff;--txt2:#888;--txt3:#383838;--red:#e8222e;}
html{height:100%;height:-webkit-fill-available;}
body{width:100%;height:100%;min-height:-webkit-fill-available;background:var(--bg);color:var(--txt);font-family:'Roboto',-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;flex-shrink:0;}
#topbar h1{font-size:28px;font-weight:800;letter-spacing:-.5px;}
.logo-badge{font-size:13px;font-weight:800;color:var(--txt);}
.logo-badge span{color:var(--red);}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e8222e,#8B0000);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;}
.topbar-right{display:flex;align-items:center;gap:10px;}

/* BODY */
#body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#body::-webkit-scrollbar{display:none;}
.page{display:none;} .page.active{display:block;}

/* CHIPS */
.chips{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 16px;border-radius:50px;background:var(--bg3);color:var(--txt2);font-size:13px;font-weight:600;border:none;cursor:pointer;user-select:none;transition:background .15s,color .15s;}
.chip.active{background:var(--txt);color:var(--bg);}
.chip:active{opacity:.6;}

/* HERO */
.hero-wrap{padding:0 20px 24px;}
.hero-card{position:relative;border-radius:22px;overflow:hidden;height:240px;background:#111;cursor:pointer;}
.hero-card:active{opacity:.85;}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.05) 65%);}
.hero-content{position:absolute;inset:0;padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between;}
.hero-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;display:inline-block;}
.hero-play-btn{width:40px;height:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(232,34,46,.5);}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hero-title{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:5px;}
.hero-artist{font-size:13px;color:rgba(255,255,255,.55);}
.hero-note{font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.sec-title{font-size:20px;font-weight:800;}
.sec-count{font-size:12px;color:var(--txt3);}

/* SONG ROW */
.song-list{padding:0 20px;}
.song-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #0f0f0f;cursor:pointer;user-select:none;}
.song-row:active{opacity:.6;}
.song-art{width:50px;height:50px;border-radius:10px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;}
.song-art img{width:100%;height:100%;object-fit:cover;}
.song-info{flex:1;min-width:0;}
.song-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);}
.song-title.active{color:var(--red);}
.song-artist{font-size:11px;color:var(--txt2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.song-dur{font-size:11px;color:var(--txt3);}
.song-play{width:30px;height:30px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.song-play.playing{background:var(--red);}

/* SEARCH PAGE */
.search-sticky{position:sticky;top:0;background:var(--bg);z-index:10;padding:12px 16px 10px;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:16px;padding:12px 16px;}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-family:inherit;}
.search-box input::placeholder{color:var(--txt3);}
.search-clear{cursor:pointer;padding:2px;color:var(--txt3);}
.search-hint{font-size:12px;color:var(--txt3);margin-top:8px;padding:0 2px;}
.cats{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 24px;}
.cat-pill{padding:8px 16px;border-radius:20px;background:var(--bg3);font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;user-select:none;}
.cat-pill:active{opacity:.6;}
.search-results{padding:0 16px 24px;}
.search-count{font-size:12px;color:var(--txt3);margin-bottom:12px;}

/* LIBRARY */
.lib-wrap{padding:0 0 24px;}
.lib-empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.lib-empty-icon{font-size:48px;margin-bottom:12px;}
.lib-empty-title{font-size:15px;font-weight:700;color:var(--txt2);}
.lib-empty-sub{font-size:13px;margin-top:6px;}

/* STATES */
.state-box{padding:80px 20px;text-align:center;color:var(--txt3);}
.state-icon{font-size:40px;margin-bottom:12px;}
.state-title{font-size:15px;font-weight:700;color:var(--txt2);}
.state-sub{font-size:13px;margin-top:6px;}

/* MINI PLAYER */
#player{flex-shrink:0;background:var(--bg2);border-top:1px solid #1a1a1a;position:relative;display:none;}
#player.visible{display:block;}
.progress-wrap{position:absolute;top:0;left:0;right:0;height:8px;cursor:pointer;z-index:5;}
.progress-track{height:2px;background:#111;margin:3px 0;}
.progress-fill{height:100%;background:var(--red);border-radius:0 2px 2px 0;width:0%;transition:width .3s linear;}
.player-inner{display:flex;align-items:center;gap:12px;padding:12px 14px 6px;}
.player-art{width:46px;height:46px;border-radius:10px;flex-shrink:0;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;}
.player-art img{width:100%;height:100%;object-fit:cover;}
.player-info{flex:1;min-width:0;}
.player-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);}
.player-artist{font-size:11px;color:var(--txt3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-ctrls{display:flex;align-items:center;gap:0;}
.ctrl-btn{width:36px;height:36px;border-radius:50%;background:transparent;border:none;color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .1s;user-select:none;}
.ctrl-btn:active{background:#2a2a2a;color:var(--txt);}
.ctrl-btn.big{width:44px;height:44px;color:var(--txt);}
.ctrl-btn.like{color:var(--txt3);}
.ctrl-btn.like.liked{color:var(--red);}
.player-times{display:flex;justify-content:space-between;padding:0 14px 8px;}
.player-times span{font-size:10px;color:var(--txt3);}

/* BOTTOM NAV */
#nav{flex-shrink:0;height:60px;background:#080808;border-top:1px solid #141414;display:flex;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--txt3);font-size:10px;font-weight:400;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.nav-tab.active{color:var(--txt);font-weight:700;}
.nav-tab:active{opacity:.6;}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin .8s linear infinite;}
.yt-stage{width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;display:none;}
#player.show-video .yt-stage{display:block;}
.yt-stage iframe{width:100%;height:100%;border:0;display:block;}
.setup-box{padding:50px 24px;text-align:center;color:var(--txt2);}
.setup-box a{color:var(--red);text-decoration:underline;}
.setup-box .state-icon{font-size:40px;margin-bottom:12px;}
.setup-box .state-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:8px;}
.setup-box .state-sub{font-size:13px;line-height:1.6;color:var(--txt2);max-width:320px;margin:0 auto;}
.lyrics-link{cursor:pointer;display:flex;align-items:center;gap:4px;}
.lyrics-link:active{opacity:.6;}
</style>
</head>

  <!-- TOPBAR -->

<script>
/* ── State ── */
let queue = [], currentSong = null, liked = [];
let currentCat = 'Pop Indonesia';
let searchTimer = null;
let ytPlayer = null, ytReady = false, pendingPlay = null, progressTimer = null;

/* ============================================================
   SETUP WAJIB supaya lagu diputar FULL (bukan cuma 30 detik):
   1. Buka https://console.cloud.google.com/
   2. Buat project baru (gratis)
   3. Library -> aktifkan "YouTube Data API v3"
   4. Credentials -> Create Credentials -> API key
   5. Tempel API key di bawah, menggantikan teks placeholder
   Kuota gratis: 10.000 unit/hari (sekitar 90-100x pencarian/hari)
   ============================================================ */
const YOUTUBE_API_KEY = 'AIzaSyC-KV-lsTvxbMmxSC_VZD3cyi7YFcePbkc';
function apiKeyReady() {
  return !!YOUTUBE_API_KEY && YOUTUBE_API_KEY.length > 20 && !YOUTUBE_API_KEY.includes('TEMPEL_API_KEY');
}

const HOME_CATS = [
  {label:'Pop ID',    q:'pop indonesia hits'},
  {label:'R&B ID',   q:'rnb indonesia'},
  {label:'Tulus',    q:'Tulus'},
  {label:'Mahalini', q:'Mahalini'},
  {label:'Afgan',    q:'Afgan Indonesia'},
  {label:'Dangdut',  q:'dangdut hits'},
  {label:'Kpop',     q:'kpop hits 2024'},
  {label:'Pop Dunia',q:'pop hits 2024'},
];

const SEARCH_CATS = [
  {name:'Pop ID',       q:'pop indonesia 2024'},
  {name:'Tulus',        q:'Tulus'},
  {name:'Mahalini',     q:'Mahalini'},
  {name:'Afgan',        q:'Afgan Indonesia'},
  {name:'Raisa',        q:'Raisa Andriana'},
  {name:'Andmesh',      q:'Andmesh'},
  {name:'Kunto Aji',    q:'Kunto Aji'},
  {name:'Isyana',       q:'Isyana Sarasvati'},
  {name:'Dangdut',      q:'dangdut hits'},
  {name:'Rock ID',      q:'rock indonesia'},
  {name:'Hip Hop ID',   q:'hip hop indonesia'},
  {name:'Taylor Swift', q:'Taylor Swift'},
  {name:'Coldplay',     q:'Coldplay'},
  {name:'Ed Sheeran',   q:'Ed Sheeran'},
  {name:'BTS',          q:'BTS kpop'},
  {name:'Billie Eilish',q:'Billie Eilish'},
  {name:'The Weeknd',   q:'The Weeknd'},
  {name:'Doja Cat',     q:'Doja Cat'},
];

/* Utils */
const fmtS = s => { s = Math.max(0, Math.floor(s||0)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; };
function isoToSec(iso) {
  const m = (iso||'').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m) return 0;
  return (+m[1]||0)*3600 + (+m[2]||0)*60 + (+m[3]||0);
}
const _decoder = document.createElement('textarea');
function decodeHtml(str) { _decoder.innerHTML = str || ''; return _decoder.value; }
function esc(str) {
  return str ? String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

/* YouTube Search -> metadata lagu, lalu diputar FULL lewat player resmi (bukan preview) */
async function fetchSongs(term, limit = 25) {
  if(!apiKeyReady()) { const err = new Error('API key belum diisi'); err.code = 'NO_API_KEY'; throw err; }
  const sUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=${limit}&q=${encodeURIComponent(term+' official audio')}&key=${YOUTUBE_API_KEY}`;
  const sRes = await fetch(sUrl);
  const sData = await sRes.json();
  if(sData.error) { const err = new Error(sData.error.message); err.code = 'YT_ERROR'; throw err; }
  const items = (sData.items||[]).filter(it => it.id && it.id.videoId);
  if(!items.length) return [];
  const ids = items.map(it=>it.id.videoId).join(',');
  const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${ids}&key=${YOUTUBE_API_KEY}`);
  const dData = await dRes.json();
  const durMap = {};
  (dData.items||[]).forEach(v => durMap[v.id] = isoToSec(v.contentDetails.duration));
  return items.map(it => {
    const vid = it.id.videoId, sn = it.snippet;
    const thumb = sn.thumbnails || {};
    return {
      id: vid,
      title: decodeHtml(sn.title),
      artist: decodeHtml(sn.channelTitle),
      album: '',
      art: (thumb.high || thumb.medium || thumb.default || {}).url,
      artSm: (thumb.medium || thumb.default || {}).url,
      dur: fmtS(durMap[vid]||0),
    };
  });
}

/* YouTube IFrame Player resmi -> audio+video penuh, tidak terpotong 30 detik */
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-mount', {
    height: '100%', width: '100%',
    playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady: () => {
        ytReady = true;
        if(pendingPlay) { const p = pendingPlay; pendingPlay = null; playSong(p.song, p.list); }
      },
      onStateChange: onPlayerStateChange,
    }
  });
}
window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

function onPlayerStateChange(e) {
  const icon = document.getElementById('play-icon');
  if(e.data === YT.PlayerState.PLAYING) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    startProgressLoop(); refreshRows();
  } else if(e.data === YT.PlayerState.PAUSED) {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    stopProgressLoop(); refreshRows();
  } else if(e.data === YT.PlayerState.ENDED) {
    stopProgressLoop(); nextSong();
  }
}

function startProgressLoop() {
  stopProgressLoop();
  progressTimer = setInterval(() => {
    if(!ytPlayer || typeof ytPlayer.getDuration !== 'function') return;
    const dur = ytPlayer.getDuration()||0, cur = ytPlayer.getCurrentTime()||0;
    document.getElementById('progress-fill').style.width = (dur ? (cur/dur)*100 : 0) + '%';
    document.getElementById('time-cur').textContent = fmtS(cur);
    document.getElementById('time-dur').textContent = fmtS(dur);
  }, 400);
}
function stopProgressLoop() { clearInterval(progressTimer); progressTimer = null; }

function playSong(song, list) {
  currentSong = song;
  if(list) queue = list;
  if(!ytReady) { pendingPlay = {song, list}; }
  else { ytPlayer.loadVideoById(song.id); ytPlayer.playVideo(); }

  document.getElementById('player').classList.add('visible');
  document.getElementById('player-title').textContent  = song.title;
  document.getElementById('player-artist').textContent = song.artist;
  const artEl = document.getElementById('player-art');
  artEl.innerHTML = song.artSm ? `<img src="${song.artSm}" alt="" onerror="this.parentNode.innerHTML='\U0001F3B5'">` : '\U0001F3B5';
  document.getElementById('btn-like').classList.toggle('liked', !!liked.find(s=>s.id===song.id));
  refreshRows();
}

function togglePlay() {
  if(!currentSong || !ytReady) return;
  if(ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
  else ytPlayer.playVideo();
}
function nextSong() {
  const i = queue.findIndex(s=>s.id===currentSong?.id);
  if(i>=0 && i<queue.length-1) playSong(queue[i+1], queue);
}
function prevSong() {
  const i = queue.findIndex(s=>s.id===currentSong?.id);
  if(i>0) playSong(queue[i-1], queue);
}
function toggleLike() {
  if(!currentSong) return;
  const has = liked.find(s=>s.id===currentSong.id);
  liked = has ? liked.filter(s=>s.id!==currentSong.id) : [...liked, currentSong];
  document.getElementById('btn-like').classList.toggle('liked', !has);
  document.getElementById('lib-count').textContent = liked.length + ' lagu disukai';
  document.getElementById('profile-liked').textContent = liked.length + ' lagu disukai';
  renderLibrary();
}
function toggleVideo() { document.getElementById('player').classList.toggle('show-video'); }
function openLyrics() {
  if(!currentSong) return;
  const q = encodeURIComponent(`${currentSong.title} ${currentSong.artist} lirik`);
  window.open(`https://genius.com/search?q=${q}`, '_blank');
}

document.getElementById('progress-wrap').addEventListener('pointerdown', e => {
  if(!ytReady || typeof ytPlayer.getDuration !== 'function') return;
  const r = e.currentTarget.getBoundingClientRect();
  const dur = ytPlayer.getDuration()||0;
  if(dur) ytPlayer.seekTo(dur * (e.clientX-r.left)/r.width, true);
});

function songRowHTML(s) {
  const isActive = currentSong && currentSong.id === s.id;
  const isPlaying = isActive && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
  const playPath = isPlaying ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z";
  const artHtml = s.artSm ? `<img src="${s.artSm}" alt="" onerror="this.parentNode.innerHTML='\U0001F3B5'">` : '\U0001F3B5';
  return `
    <div class="song-row" data-id="${s.id}">
      <div class="song-art">${artHtml}</div>
      <div class="song-info">
        <div class="song-title${isActive?' active':''}">${esc(s.title)}</div>
        <div class="song-artist">${esc(s.artist)}</div>
      </div>
      <div class="song-right">
        <span class="song-dur">${s.dur}</span>
        <div class="song-play${isPlaying?' playing':''}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="${playPath}"/></svg>
        </div>
      </div>
    </div>`;
}
function attachRowListeners(container, list) {
  container.querySelectorAll('.song-row').forEach((row, i) => {
    row.addEventListener('click', () => playSong(list[i], list));
  });
}
function refreshRows() {
  document.querySelectorAll('.song-row').forEach(row => {
    const id = row.dataset.id;
    const isActive = currentSong && currentSong.id === id;
    const isPlaying = isActive && ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    const titleEl = row.querySelector('.song-title');
    const playEl  = row.querySelector('.song-play');
    const pathEl  = row.querySelector('.song-play path');
    if(titleEl) titleEl.classList.toggle('active', isActive);
    if(playEl)  playEl.classList.toggle('playing', isPlaying);
    if(pathEl)  pathEl.setAttribute('d', isPlaying ? "M6 19h4V5H6v14zm8-14v14h4V5h-4z" : "M8 5v14l11-7z");
  });
}

function initHomeChips() {
  const container = document.getElementById('home-chips');
  container.innerHTML = HOME_CATS.map((c,i) =>
    `<button class="chip${i===0?' active':''}" onclick="loadHome('${c.q}','${c.label}',this)">${c.label}</button>`
  ).join('');
}

function setupBoxHTML() {
  return `<div class="setup-box">
    <div class="state-icon">\U0001F511</div>
    <div class="state-title">API Key YouTube belum diisi</div>
    <div class="state-sub">Supaya lagu bisa diputar penuh (bukan 30 detik), app ini butuh API key gratis dari YouTube Data API v3.<br><br>
    Buka <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a>, aktifkan "YouTube Data API v3", buat API key, lalu tempel ke variabel <b>YOUTUBE_API_KEY</b> di bagian atas script file ini.</div>
  </div>`;
}

async function loadHome(q, label, chipEl) {
  currentCat = label;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  if(chipEl) chipEl.classList.add('active');
  const content = document.getElementById('home-content');
  content.innerHTML = `<div class="state-box"><div class="state-icon">\U0001F3B5</div><div class="state-title">Memuat ${label}...</div></div>`;
  try {
    const songs = await fetchSongs(q, 25);
    if(!songs.length) throw new Error('empty');
    queue = songs;
    const hero = songs[0];
    content.innerHTML = `
      <div class="hero-wrap">
        <div class="hero-card" id="hero-card">
          ${hero.art ? `<img class="hero-img" src="${hero.art}" alt="" onerror="this.remove()">` : ''}
          <div class="hero-overlay"></div>
          <div class="hero-content">
            <div class="hero-top">
              <span class="hero-tag">${esc(label)}</span>
              <div class="hero-play-btn">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
            <div>
              <div class="hero-title">${esc(hero.title)}</div>
              <div class="hero-artist">${esc(hero.artist)}</div>
              <div class="hero-note">\u25B6 Lagu penuh via YouTube</div>
            </div>
          </div>
        </div>
      </div>
      <div class="sec-head">
        <span class="sec-title">${esc(label)}</span>
        <span class="sec-count">${songs.length} lagu</span>
      </div>
      <div class="song-list" id="home-list">
        ${songs.map(s=>songRowHTML(s)).join('')}
      </div>
      <div style="height:16px"></div>
    `;
    document.getElementById('hero-card').addEventListener('click', ()=>playSong(hero, songs));
    attachRowListeners(document.getElementById('home-list'), songs);
  } catch(e) {
    if(e.code === 'NO_API_KEY') content.innerHTML = setupBoxHTML();
    else content.innerHTML = `<div class="state-box"><div class="state-icon">\U0001F4E1</div><div class="state-title">Tidak dapat terhubung</div><div class="state-sub">${e.code==='YT_ERROR' ? esc(e.message) : 'Periksa koneksi internet kamu'}</div></div>`;
  }
}

function initSearchCats() {
  const container = document.getElementById('cats');
  container.innerHTML = SEARCH_CATS.map(c =>
    `<div class="cat-pill" onclick="doSearch('${c.q}','${c.name}')">${c.name}</div>`
  ).join('');
}

const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchHint  = document.getElementById('search-hint');

searchInput.addEventListener('input', () => {
  const v = searchInput.value.trim();
  searchClear.style.display = v ? 'block' : 'none';
  clearTimeout(searchTimer);
  if(!v) {
    document.getElementById('search-body').innerHTML = `<div class="cats" id="cats"></div>`;
    initSearchCats();
    searchHint.textContent = 'Ketuk kategori atau ketik nama lagu/artis';
    return;
  }
  searchHint.textContent = 'Mencari...';
  searchTimer = setTimeout(() => doSearch(v, null), 500);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  document.getElementById('search-body').innerHTML = `<div class="cats" id="cats"></div>`;
  initSearchCats();
  searchHint.textContent = 'Ketuk kategori atau ketik nama lagu/artis';
});

async function doSearch(q, label) {
  if(label) { searchInput.value = label; searchClear.style.display='block'; }
  searchHint.textContent = 'Mencari...';
  document.getElementById('search-body').innerHTML = `<div class="state-box"><div class="state-icon">\U0001F50D</div><div class="state-title">Mencari lagu...</div></div>`;
  try {
    const songs = await fetchSongs(q, 30);
    if(!songs.length) {
      document.getElementById('search-body').innerHTML = `<div class="state-box"><div class="state-icon">\U0001F3B5</div><div class="state-title">Tidak ditemukan</div><div class="state-sub">Coba nama artis atau judul lagu lain</div></div>`;
      searchHint.textContent = '0 hasil';
      return;
    }
    searchHint.textContent = `${songs.length} hasil \u2022 ketuk untuk mainkan`;
    document.getElementById('search-body').innerHTML = `
      <div class="search-results" id="search-list">
        ${songs.map(s=>songRowHTML(s)).join('')}
      </div>
      <div style="height:16px"></div>
    `;
    attachRowListeners(document.getElementById('search-list'), songs);
  } catch(e) {
    if(e.code === 'NO_API_KEY') { document.getElementById('search-body').innerHTML = setupBoxHTML(); searchHint.textContent = ''; }
    else {
      document.getElementById('search-body').innerHTML = `<div class="state-box"><div class="state-icon">\U0001F4E1</div><div class="state-title">Tidak dapat terhubung</div><div class="state-sub">${e.code==='YT_ERROR' ? esc(e.message) : 'Cek koneksi internet'}</div></div>`;
      searchHint.textContent = 'Gagal memuat';
    }
  }
}

function renderLibrary() {
  document.getElementById('lib-count').textContent = liked.length + ' lagu disukai';
  document.getElementById('profile-liked').textContent = liked.length + ' lagu disukai';
  const content = document.getElementById('lib-content');
  if(!liked.length) {
    content.innerHTML = `<div class="lib-empty"><div class="lib-empty-icon">\u2764\uFE0F</div><div class="lib-empty-title">Belum ada lagu disukai</div><div class="lib-empty-sub">Ketuk \u2764 saat memutar lagu</div></div>`;
    return;
  }
  content.innerHTML = `<div class="song-list" id="lib-list">${liked.map(s=>songRowHTML(s)).join('')}</div><div style="height:16px"></div>`;
  attachRowListeners(document.getElementById('lib-list'), liked);
}

const PAGE_TITLES = {home:'Beranda',search:'Mencari',library:'Pustaka',profile:'Profil'};
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[tab];
  document.getElementById('body').scrollTop = 0;
  if(tab==='library') renderLibrary();
}

initHomeChips();
initSearchCats();
loadHome('pop indonesia hits', 'Pop Indonesia', document.querySelector('.chip'));

/* Fix viewport height on mobile browsers (address bar hiding nav) */
function fixAppHeight() {
  document.getElementById('app').style.height = window.innerHeight + 'px';
}
fixAppHeight();
window.addEventListener('resize', fixAppHeight);
window.addEventListener('orientationchange', function(){ setTimeout(fixAppHeight, 300); });
</script>
